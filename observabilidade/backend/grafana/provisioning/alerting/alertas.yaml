apiVersion: 1
groups:
  - orgId: 1
    name: otel-collector-alerts
    folder: Observabilidade
    interval: 30s
    rules:
      - uid: exporter-sem-dados
        title: Exporter sem dados
        condition: C
        data:
          - refId: A
            datasourceUid: mimir-ds
            relativeTimeRange:
              from: 300
              to: 0
            model:
              expr: rate(otelcol_exporter_sent_metric_points_total[5m]) < 0.1
              format: time_series
        for: 5m
        annotations:
          summary: "Exporter não está enviando métricas"
        labels:
          severity: critical


