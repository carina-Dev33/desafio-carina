{
  "title": "Ausência de Dados – OTEL Collector",
  "schemaVersion": 36,
  "version": 1,
  "panels": [
    {
      "title": "Taxa de métricas exportadas (métricas/s)",
      "type": "timeseries",
      "gridPos": { "x": 0, "y": 0, "w": 24, "h": 8 },
      "targets": [
        {
          "expr": "rate(otelcol_exporter_sent_metric_points_total[1m])",
          "legendFormat": "{{exporter}}"
        }
      ],
      "alert": {
        "name": "Collector sem dados",
        "conditions": [
          {
            "evaluator": { "type": "lt", "params": [0.1] },
            "operator": { "type": "and" },
            "query": { "params": ["A", "5m", "now"] },
            "reducer": { "type": "avg" },
            "type": "query"
          }
        ],
        "for": "5m",
        "annotations": {
          "summary": "Collector não está exportando métricas"
        }
      }
    },
    {
      "title": "Total acumulado de métricas exportadas",
      "type": "timeseries",
      "gridPos": { "x": 0, "y": 8, "w": 24, "h": 8 },
      "targets": [
        {
          "expr": "otelcol_exporter_sent_metric_points_total",
          "legendFormat": "{{exporter}}"
        }
      ]
    }
  ]
}
