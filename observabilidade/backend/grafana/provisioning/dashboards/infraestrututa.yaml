{
  "title": "Infraestrutura – Node & cAdvisor",
  "schemaVersion": 36,
  "version": 1,
  "panels": [
    {
      "title": "Uso de CPU (%)",
      "type": "timeseries",
      "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
      "targets": [
        {
          "expr": "100 - (avg by(instance)(rate(node_cpu_seconds_total{mode=\"idle\"}[1m])) * 100)",
          "legendFormat": "CPU"
        }
      ]
    },
    {
      "title": "Memória Usada",
      "type": "timeseries",
      "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
      "targets": [
        {
          "expr": "node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes",
          "legendFormat": "Memória usada"
        }
      ]
    },
    {
      "title": "Uso de Disco (%)",
      "type": "timeseries",
      "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
      "targets": [
        {
          "expr": "100 * (1 - (node_filesystem_avail_bytes{fstype!=\"tmpfs\"} / node_filesystem_size_bytes{fstype!=\"tmpfs\"}))",
          "legendFormat": "Disco"
        }
      ]
    },
    {
      "title": "Tráfego de Rede (bytes/s)",
      "type": "timeseries",
      "gridPos": { "x": 12, "y": 8, "w": 12, "h": 8 },
      "targets": [
        {
          "expr": "rate(node_network_receive_bytes_total[1m])",
          "legendFormat": "RX"
        },
        {
          "expr": "rate(node_network_transmit_bytes_total[1m])",
          "legendFormat": "TX"
        }
      ]
    },
    {
      "title": "CPU por Container",
      "type": "timeseries",
      "gridPos": { "x": 0, "y": 16, "w": 12, "h": 8 },
      "targets": [
        {
          "expr": "rate(container_cpu_usage_seconds_total[1m])",
          "legendFormat": "{{container}}"
        }
      ]
    },
    {
      "title": "Memória por Container",
      "type": "timeseries",
      "gridPos": { "x": 12, "y": 16, "w": 12, "h": 8 },
      "targets": [
        {
          "expr": "container_memory_usage_bytes",
          "legendFormat": "{{container}}"
        }
      ]
    }
  ]
}
