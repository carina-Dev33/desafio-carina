receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  filelog/mimir:
    include: [/var/lib/docker/containers/*/*-json.log]
    start_at: beginning
    operators:
      - type: json_parser
        id: docker-json
        parse_from: body

  prometheus/collector:
    config:
      scrape_configs:
        - job_name: otel-collector
          scrape_interval: 10s
          static_configs:
            - targets: ["otel-collector:8888"]

  prometheus/node:
    config:
      scrape_configs:
        - job_name: node-exporter
          static_configs:
            - targets: ["node-exporter:9100"]

  prometheus/cadvisor:
    config:
      scrape_configs:
        - job_name: cadvisor
          static_configs:
            - targets: ["cadvisor:8080"]

processors:
  memory_limiter:
    check_interval: 1s
    limit_percentage: 75
    spike_limit_percentage: 15

  batch:
    timeout: 5s
    send_batch_size: 1024

  resource:
    attributes:
      - key: service.namespace
        value: observabilidade
        action: upsert
      - key: deployment.environment
        value: local
        action: upsert

exporters:
  debug:
    verbosity: detailed

  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  otlphttp/loki:
    endpoint: http://loki:3100/otlp
    tls:
      insecure: true

  prometheusremotewrite:
    endpoint: http://mimir:9009/api/v1/push
    tls:
      insecure: true

connectors:
  servicegraph:
    dimensions:
      - http.method
      - http.status_code

service:
  telemetry:
    logs:
      level: info

  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [otlp/tempo, debug]

    metrics:
      receivers: [otlp, prometheus/node, prometheus/cadvisor, prometheus/collector]
      processors: [memory_limiter, resource, batch]
      exporters: [prometheusremotewrite, debug]

    logs:
      receivers: [otlp, filelog/mimir]
      processors: [memory_limiter, resource, batch]
      exporters: [otlphttp/loki, debug]